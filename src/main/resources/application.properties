# Synapse-DB API layer (Phase 4)
spring.application.name=synapse-db
server.port=8080

# OpenAPI / Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# Engine config is read from SYNAPSE_* environment variables (see MemoryConfig.fromEnv).
# Defaults: MAX_AGENTS=64, SHARD_SIZE=1048576, LAMBDA=0.1, DATA_DIR=./data, CONFIG_DIR=./config

# Actuator / Micrometer (Phase 6)
# Management port is separate from the API port so ApiKeyFilter never sees actuator requests.
# EXPOSE only 8080 in Docker; 9090 is reachable only inside the container (HEALTHCHECK uses it).
management.server.port=9090
management.server.address=127.0.0.1
management.endpoints.web.exposure.include=health,prometheus
management.endpoint.health.show-details=when-authorized
management.endpoint.prometheus.enabled=true

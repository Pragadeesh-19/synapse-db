# Synapse-DB API layer (Phase 4)
spring.application.name=synapse-db
server.port=8080

# OpenAPI / Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# Engine config is read from SYNAPSE_* environment variables (see MemoryConfig.fromEnv).
# Defaults: MAX_AGENTS=64, SHARD_SIZE=1048576, LAMBDA=0.1, DATA_DIR=./data, CONFIG_DIR=./config
